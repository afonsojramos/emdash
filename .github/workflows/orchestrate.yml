name: Bot orchestrate

# The state-machine BRAIN. One event-driven workflow that owns every issue-side
# transition, replacing the orchestration logic previously spread across
# investigate.yml, reporter-reply.yml, and maintainer-reply.yml. It is
# deterministic where it can be (the router in .github/bot/router.cjs) and only
# calls a Flue classifier for the genuinely fuzzy events (a reporter's free-text
# reply, a maintainer's free-text directive).
#
# Two-job structure:
#
#   route (no concurrency): parses the event, resolves the anchoring issue #,
#     the actor role, and the decision (deterministic event, free-text command
#     needing classification, readonly, or skip). Emits these as outputs.
#
#   apply (concurrency on the anchoring issue): runs the classifier when
#     needed, then resolve()s against LIVE labels and applies the transition.
#
# The two jobs is what unifies PR-comment vs issue-comment concurrency for the
# SAME anchoring issue: the workflow-level concurrency expression cannot derive
# the anchor from a PR comment (the bot/fix-<n> ref is only in the API payload),
# but the apply job CAN read it from the route job's output via needs.*. So a
# PR comment for PR #200 (anchoring issue #123) and an issue comment for #123
# both route to the same apply-concurrency group `orchestrate-apply-123`.
#
# Gated behind the BOT_STATE_MACHINE_V2 repo variable so it stays inert until
# the bot:* label taxonomy is live and the legacy workflows retire.

on:
  issues:
    types: [opened, reopened, labeled]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  route:
    name: Route event
    if: vars.BOT_STATE_MACHINE_V2 == '1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      anchorIssue: ${{ steps.route.outputs.anchorIssue }}
      payload: ${{ steps.route.outputs.payload }}
      classify: ${{ steps.route.outputs.classify }}
      skip: ${{ steps.route.outputs.skip }}
    steps:
      - name: Checkout (router only)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Generate app token (route is read-only)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: emdash-cms
          repositories: emdash
          permission-contents: read
          permission-metadata: read
          permission-issues: read
          permission-pull-requests: read

      - name: Route event
        id: route
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const router = require('./.github/bot/router.cjs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ev = context.eventName;

            // Resolve the anchoring issue and a normalized event.
            let issueNumber, prNumber = null, body = '', actorLogin = '', kind = 'event';
            if (ev === 'issues') {
              // `issues` event fires for PRs too. Don't treat a labeled PR as
              // an issue command; PR-side commands come via issue_comment and
              // are routed through the bot-PR check below.
              if (context.payload.issue.pull_request) { core.setOutput('skip', 'issues-event-on-pr'); return; }
              issueNumber = context.payload.issue.number;
              actorLogin = context.payload.sender.login;
              kind = context.payload.action; // opened|reopened|labeled
            } else if (ev === 'issue_comment') {
              actorLogin = context.payload.comment.user.login;
              body = context.payload.comment.body || '';
              if (context.payload.issue.pull_request) {
                // Comment on a PR: three guards (same repo, branch name
                // pattern, AND authored by emdashbot[bot]). Fork PRs and
                // human same-repo branches can both be named bot/fix-<n>;
                // each alone is forgeable.
                const prNum = context.payload.issue.number;
                const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
                const sameRepo = pr.head.repo && pr.head.repo.full_name === `${owner}/${repo}`;
                const m = /^bot\/fix-(\d+)$/.exec(pr.head.ref || '');
                const botAuthored = pr.user && pr.user.login === 'emdashbot[bot]';
                if (!m || !sameRepo || !botAuthored) { core.setOutput('skip', 'not-a-bot-pr'); return; }
                issueNumber = Number(m[1]);
                prNumber = prNum;
                kind = 'pr_comment';
              } else {
                issueNumber = context.payload.issue.number;
                kind = 'issue_comment';
              }
            } else if (ev === 'pull_request_target' && context.payload.action === 'closed') {
              const pr = context.payload.pull_request;
              const sameRepo = pr.head.repo && pr.head.repo.full_name === `${owner}/${repo}`;
              const m = /^bot\/fix-(\d+)$/.exec(pr.head.ref || '');
              const botAuthored = pr.user && pr.user.login === 'emdashbot[bot]';
              if (!m || !sameRepo || !botAuthored || !pr.merged) { core.setOutput('skip', 'not-a-merged-bot-pr'); return; }
              issueNumber = Number(m[1]);
              prNumber = pr.number;
              kind = 'pr_merged';
            } else { core.setOutput('skip', 'unhandled-event'); return; }

            // Anchor is the issue number the apply job will key its
            // concurrency on. This is the single point that unifies PR-comment
            // and issue-comment serialization for the same item.
            core.setOutput('anchorIssue', String(issueNumber));

            // Live labels (authoritative, never the event snapshot).
            const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
            const labels = issue.labels.map((l) => (typeof l === 'string' ? l : l.name));

            // Actor role: maintainer (live write/triage/admin), reporter, other.
            let role = 'other';
            if (actorLogin === issue.user.login) role = 'reporter';
            try {
              const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({ owner, repo, username: actorLogin });
              if (['admin', 'write', 'maintain'].includes(perm.permission) ||
                  ['admin', 'write', 'triage', 'maintain'].includes(perm.role_name || '')) role = 'maintainer';
            } catch { /* not a collaborator */ }

            const state = router.currentState(labels);
            const out = { issueNumber, prNumber, role, state, labels, actorLogin, body };

            if (kind === 'pr_merged') {
              core.setOutput('payload', JSON.stringify({ ...out, event: 'pr.merged', actor: 'system' }));
              return;
            }
            if (kind === 'labeled') {
              const added = context.payload.label && context.payload.label.name;
              const map = { 'bot:repro': 'repro', 'bot:implement': 'implement' };
              if (map[added]) { core.setOutput('payload', JSON.stringify({ ...out, event: map[added], actor: role })); return; }
              core.setOutput('skip', 'label-not-a-trigger'); return;
            }
            if (kind === 'opened' || kind === 'reopened') { core.setOutput('skip', 'no-command-on-open'); return; }

            const isBotPr = prNumber != null;
            const decision = router.resolveComment({ labels, body, actor: role, allowDefault: isBotPr });
            if (decision.kind === 'transition') {
              core.setOutput('payload', JSON.stringify({ ...out, event: decision.event, arg: decision.arg || null, actor: role }));
              return;
            }
            if (decision.kind === 'readonly') {
              core.setOutput('payload', JSON.stringify({ ...out, event: decision.event, actor: role }));
              return;
            }
            if (decision.kind === 'classify') {
              // The classifier needs OUR bot's last message to resolve references
              // like "option A". Filtering on type === 'Bot' would pull in
              // Dependabot/Codecov; match the App login exactly.
              let botContext = '';
              try {
                // The first page is the OLDEST 100 comments (default sort: asc).
                // We want the LATEST bot comment; on a long-thread issue,
                // page 1 misses it entirely. Paginate via the iterator and
                // keep the most recent emdashbot[bot] body.
                let latest = '';
                for await (const page of github.paginate.iterator(
                  github.rest.issues.listComments, { owner, repo, issue_number: issueNumber, per_page: 100 },
                )) {
                  for (const c of page.data) {
                    if (c.user && c.user.login === 'emdashbot[bot]') latest = c.body || '';
                  }
                }
                botContext = latest;
              } catch { /* best effort */ }
              core.setOutput('classify', 'command');
              core.setOutput('payload', JSON.stringify({ ...out, classify: { state: decision.state, commands: decision.commands, text: decision.text }, botContext }));
              return;
            }
            core.setOutput('skip', decision.reason || 'no-op');

  apply:
    name: Classify + apply
    needs: route
    if: needs.route.outputs.payload && !needs.route.outputs.skip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # Job-level concurrency keyed on the ANCHORING issue # (computed by route).
    # This is what unifies PR-comment and issue-comment serialization for the
    # same item: a PR comment for PR #200 (anchoring #123) and an issue comment
    # for #123 both land here as `orchestrate-apply-123`.
    concurrency:
      group: orchestrate-apply-${{ needs.route.outputs.anchorIssue }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Generate app token (writes)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: emdash-cms
          repositories: emdash
          # Narrow scopes. contents:write is required to fire
          # repository_dispatch (GitHub maps POST /repos/.../dispatches to
          # the contents permission, not actions). This brain never commits.
          permission-contents: write
          permission-metadata: read
          permission-issues: write
          permission-pull-requests: write
          permission-actions: write

      # --- classify (conditional): free-text reply -> event via Flue ---
      - name: Setup Node
        if: needs.route.outputs.classify
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install pnpm
        if: needs.route.outputs.classify
        run: npm i -g pnpm@11.1.3

      - name: Build classifier (.flue)
        if: needs.route.outputs.classify
        working-directory: .flue
        run: |
          pnpm install --frozen-lockfile=false
          pnpm exec flue build --target node --output .build

      - name: Run command classifier
        id: classify
        if: needs.route.outputs.classify
        working-directory: .flue
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_GATEWAY_ID: ${{ secrets.CLOUDFLARE_GATEWAY_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          PAYLOAD: ${{ needs.route.outputs.payload }}
        run: |
          # The candidate commands were chosen by the router; the comment text
          # and bot context travel as JSON, never interpolated into a command.
          jq '{issueNumber: .issueNumber, state: .classify.state, comment: .classify.text,
               botContext: (.botContext // ""), commands: .classify.commands}' \
            <<<"$PAYLOAD" > /tmp/classify-input.json
          CLASSIFY_RESULT_PATH=/tmp/classify-result.json \
            pnpm exec flue run classify-command --target node --input "$(cat /tmp/classify-input.json)" || true
          # Read directly via fs.readFile in the apply step; never echo model
          # output into $GITHUB_OUTPUT (a newline would inject extra outputs).

      # --- apply the decision ---
      - name: Apply decision
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('node:fs');
            const router = require('./.github/bot/router.cjs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const p = JSON.parse(process.env.PAYLOAD);

            // Read the classifier result from disk, never the shell env (the
            // classifier's `arg` is model output shaped by untrusted comment
            // text; routing it through shell would let a newline inject extra
            // event=... outputs). JSON.parse gives us a single typed object.
            let cls = null;
            if (process.env.CLASSIFY === 'command') {
              try { cls = JSON.parse(fs.readFileSync('/tmp/classify-result.json', 'utf8')); }
              catch { /* missing/corrupt -> treat as 'none' below */ }
            }

            // Whitelist the event against the machine's known set; never trust
            // a model-supplied string directly. resolve() will no-op on any
            // event the current state doesn't allow.
            let event = p.event;
            let arg = p.arg || null;
            if (!event && cls && typeof cls.event === 'string' && cls.event !== 'none' &&
                Object.prototype.hasOwnProperty.call(router.machine.events, cls.event)) {
              event = cls.event;
              if (typeof cls.arg === 'string' && cls.arg.length) arg = cls.arg;
            }
            if (!event) {
              core.info(`no event resolved (classifier=${cls?.event || 'n/a'}); leaving issue untouched`);
              return;
            }

            // Re-fetch live labels. The route job's snapshot is stale by now;
            // re-reading closes most of the cross-job race window (the apply
            // job-level concurrency closes the rest for the same anchor).
            const { data: live } = await github.rest.issues.get({ owner, repo, issue_number: p.issueNumber });
            const liveLabels = live.labels.map((l) => (typeof l === 'string' ? l : l.name));

            const decision = router.resolve({ labels: liveLabels, event, arg, actor: p.actor });
            if (decision.kind === 'readonly') {
              await github.rest.issues.createComment({ owner, repo, issue_number: p.issueNumber,
                body: `Current state: \`${decision.state}\`.` + router.replyFooter(decision.state) });
              return;
            }
            if (decision.kind !== 'transition') { core.info(`no-op: ${decision.reason}`); return; }

            // Fallible writes BEFORE flipping labels, so a failed side effect
            // doesn't leave the issue claiming a state that hasn't materialised.
            if (decision.action === 'openPr' && decision.to === 'in_review') {
              try {
                await github.rest.pulls.create({ owner, repo, title: `fix: address #${p.issueNumber}`,
                  head: `bot/fix-${p.issueNumber}`, base: 'main',
                  body: `Automated fix for #${p.issueNumber}. Reply \`@emdashbot <feedback>\` to revise.` });
              } catch (e) {
                core.warning(`PR create failed: ${e.message}; leaving state as-is`);
                await github.rest.issues.createComment({ owner, repo, issue_number: p.issueNumber,
                  body: `Couldn't open the PR: ${e.message}. Push the branch manually or repeat the command.` + router.replyFooter(decision.from) });
                return;
              }
            }
            if (decision.action === 'closePr' && p.prNumber) {
              try { await github.rest.pulls.update({ owner, repo, pull_number: p.prNumber, state: 'closed' }); }
              catch (e) { core.warning(`PR close failed: ${e.message}`); }
            }
            if (decision.action && decision.action.startsWith('investigate.')) {
              const mode = decision.action.split('.')[1];
              try {
                await github.rest.repos.createDispatchEvent({ owner, repo, event_type: 'investigate-run',
                  client_payload: { issueNumber: p.issueNumber, mode, directive: arg || null, prNumber: p.prNumber || null } });
              } catch (e) {
                core.warning(`dispatch failed: ${e.message}; leaving state as-is`);
                await github.rest.issues.createComment({ owner, repo, issue_number: p.issueNumber,
                  body: `Couldn't start the agent run: ${e.message}. Please repeat the command.` + router.replyFooter(decision.from) });
                return;
              }
            }

            // Now flip the labels. removeLabel failures are NOT swallowed;
            // 404 (concurrent removal) is fine, anything else throws.
            await github.rest.issues.addLabels({ owner, repo, issue_number: p.issueNumber, labels: decision.addLabels });
            for (const l of decision.removeLabels) {
              if (!liveLabels.includes(l)) continue;
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: p.issueNumber, name: l });
              } catch (e) {
                if (e.status === 404) continue;
                core.error(`removeLabel(${l}) failed: ${e.message}; issue ${p.issueNumber} may carry multiple state labels`);
                throw e;
              }
            }

            await github.rest.issues.createComment({ owner, repo, issue_number: p.issueNumber,
              body: `Moving to \`${decision.to}\`.` + router.replyFooter(decision.to) });
        env:
          PAYLOAD: ${{ needs.route.outputs.payload }}
          CLASSIFY: ${{ needs.route.outputs.classify }}
