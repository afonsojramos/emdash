name: Bot investigate run

# The EXECUTOR backend. The orchestrator (orchestrate.yml) dispatches here when
# a transition's action is investigate.* (repro / implement / revise). This is
# the only environment with the toolchain the agent needs (pnpm, git, a real
# browser via agent-browser, the ability to boot `pnpm dev` and run tests),
# which is why the heavy work stays on a GitHub Actions runner rather than a
# CF isolate.
#
# Contract (client_payload from createDispatchEvent in orchestrate.yml):
#   { issueNumber, mode: "repro"|"implement"|"revise", directive?, prNumber? }
#
# Trust split between two jobs on two separate runners:
#
#   investigate (untrusted): runs the agent. Only secret reachable here is
#     AGENT_GH_TOKEN (read-only) -- no app token, no write to GitHub. If the
#     agent produced a fix, exports it as a patch artifact. The runner is
#     thrown away when the job ends, killing any background process the agent
#     left running (the previous design ran the trusted push step on the SAME
#     runner, where a scraper could read /proc/<git-pid>/environ for APP_TOKEN
#     even with GIT_ASKPASS, because env-vars are visible to sibling processes).
#
#   apply (trusted, needs investigate): fresh runner, has the app token. The
#     agent's processes are GONE because the previous runner was decommissioned.
#     Downloads the patch + result artifacts, validates, applies the patch in
#     a fresh checkout, pushes the branch with GIT_ASKPASS, and applies the
#     state-machine transition. Never executes agent-supplied code.

on:
  repository_dispatch:
    types: [investigate-run]
  workflow_dispatch:
    inputs:
      issueNumber: { description: "Issue number", required: true, type: string }
      mode: { description: "repro | implement | revise", required: true, type: string }
      directive: { description: "Maintainer directive (implement)", required: false, type: string }

permissions:
  contents: read

concurrency:
  group: investigate-run-${{ github.event.client_payload.issueNumber || github.event.inputs.issueNumber }}
  cancel-in-progress: false

jobs:
  investigate:
    name: Investigate (untrusted)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      ISSUE_NUMBER: ${{ github.event.client_payload.issueNumber || github.event.inputs.issueNumber }}
      MODE: ${{ github.event.client_payload.mode || github.event.inputs.mode }}
      DIRECTIVE: ${{ github.event.client_payload.directive || github.event.inputs.directive }}
    outputs:
      ok: ${{ steps.investigate.outputs.ok }}
      hasPatch: ${{ steps.export.outputs.hasPatch }}
    steps:
      # Fetch the issue with a tightly-scoped, read-only app token. This token
      # never leaves this job and is unset before the agent runs.
      - name: Generate read-only app token
        id: read-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: emdash-cms
          repositories: emdash
          permission-issues: read
          permission-metadata: read

      # Always start on main (the default ref). For revise we attempt to move
      # to bot/fix-<n> in a separate step that fails gracefully: a missing
      # branch (deleted, never pushed) must not leave the issue stranded in
      # bot:working -- the workflow needs to reach the result-application step
      # so the machine can transition to failed/blocked.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Switch to revise branch
        id: revise-checkout
        if: env.MODE == 'revise'
        run: |
          BRANCH="bot/fix-${ISSUE_NUMBER}"
          if git fetch --no-tags origin "$BRANCH" 2>/dev/null && git checkout -B "$BRANCH" "origin/$BRANCH"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::revise mode requested but $BRANCH not found on origin; the agent run will report not-reproduced/failed"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch issue
        id: issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.read-token.outputs.token }}
          script: |
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
            });
            const fs = require('node:fs');
            fs.writeFileSync('/tmp/issue-title.txt', issue.title || '');
            fs.writeFileSync('/tmp/issue-body.txt', issue.body || '');

      # Runner provisioning matches the legacy investigate.yml so the agent
      # sandbox has the same tooling (pnpm, root deps, package builds, the
      # browser stack the repro-admin/repro-public skills drive via bgproc +
      # agent-browser). Carried over verbatim.
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Install browser automation tools
        run: |
          npm install -g bgproc agent-browser
          agent-browser install

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Flue agent dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .flue

      - name: Build packages
        run: pnpm build

      - name: Build agent (.flue)
        working-directory: .flue
        run: pnpm exec flue build --target node --output .build

      - name: Run investigate
        id: investigate
        working-directory: .flue
        env:
          # The agent gets ONLY the read-only sandbox token. The app token used
          # for the issue fetch above is not exported here and not reachable.
          AGENT_GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_GATEWAY_ID: ${{ secrets.CLOUDFLARE_GATEWAY_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          TITLE="$(cat /tmp/issue-title.txt)"
          jq -n \
            --argjson n "$ISSUE_NUMBER" \
            --arg t "$TITLE" \
            --rawfile b /tmp/issue-body.txt \
            --arg mode "$MODE" \
            --arg d "$DIRECTIVE" \
            '{issueNumber:$n, issueTitle:$t, issueBody:$b, owner:"emdash-cms", repo:"emdash"}
             + (if $mode=="implement" and $d!="" then {maintainerDirective:$d}
                elif $mode=="revise" and $d!="" then {retryContext:$d} else {} end)' \
            > /tmp/inv-input.json
          INVESTIGATE_RESULT_PATH=/tmp/inv-result.json \
            pnpm exec flue run investigate --target node --input "$(cat /tmp/inv-input.json)" \
            && echo "ok=true" >> "$GITHUB_OUTPUT" || echo "ok=false" >> "$GITHUB_OUTPUT"

      # Export the agent's staged changes as a patch. We do NOT push here -- the
      # apply job will validate and push from a fresh runner with the app token.
      # If `fixed` is false / no diff, hasPatch=false and no artifact is uploaded.
      - name: Export patch
        id: export
        if: steps.investigate.outputs.ok == 'true'
        run: |
          FIXED="$(jq -r '.fixed // false' /tmp/inv-result.json 2>/dev/null || echo false)"
          if [ "$FIXED" != "true" ]; then echo "hasPatch=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          # `git diff --cached` captures the agent's staged edits.
          git diff --cached --binary > /tmp/fix.patch || true
          if [ ! -s /tmp/fix.patch ]; then
            echo "::warning::agent claimed fixed=true but staged no diff; treating as not fixed"
            echo "hasPatch=false" >> "$GITHUB_OUTPUT"
          else
            jq -r --arg fallback "fix: address #${ISSUE_NUMBER}" '.commitMessage // $fallback' \
              /tmp/inv-result.json > /tmp/commit-msg.txt
            echo "hasPatch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts for the trusted apply job
        if: always() && env.ISSUE_NUMBER != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: investigate-run-${{ env.ISSUE_NUMBER }}
          path: |
            /tmp/inv-result.json
            /tmp/fix.patch
            /tmp/commit-msg.txt
          if-no-files-found: warn
          retention-days: 7

  apply:
    name: Apply (trusted)
    needs: investigate
    if: always() && needs.investigate.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      ISSUE_NUMBER: ${{ github.event.client_payload.issueNumber || github.event.inputs.issueNumber }}
      MODE: ${{ github.event.client_payload.mode || github.event.inputs.mode }}
      INV_OK: ${{ needs.investigate.outputs.ok }}
      HAS_PATCH: ${{ needs.investigate.outputs.hasPatch }}
    steps:
      # Generate the write-scoped app token AFTER the investigate job has
      # finished. The previous runner (and its agent's processes) is gone, so
      # this token never coexists with attacker-controlled code on the same
      # host.
      - name: Generate write-scoped app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: emdash-cms
          repositories: emdash
          permission-contents: write
          permission-metadata: read
          permission-issues: write
          permission-pull-requests: write

      # Clean checkout. Default to main; the patch-apply step below explicitly
      # checks out the revise branch (or detects it's missing and falls
      # through to failure handling). persist-credentials is deliberately
      # false: the token never goes in .git/config; the push step uses
      # GIT_ASKPASS so it stays in env, not argv or on-disk config.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Switch to revise branch
        id: revise-checkout
        if: env.MODE == 'revise'
        run: |
          BRANCH="bot/fix-${ISSUE_NUMBER}"
          if git fetch --no-tags origin "$BRANCH" 2>/dev/null && git checkout -B "$BRANCH" "origin/$BRANCH"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            # Branch was deleted between dispatch and apply. The investigate
            # job will have also failed its checkout, so HAS_PATCH=false; the
            # apply step here falls through to the result-application step
            # which transitions to failed/blocked rather than leaving the
            # issue stranded in bot:working.
            echo "::warning::revise mode but $BRANCH missing on origin"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download investigate artifacts
        id: download
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: investigate-run-${{ env.ISSUE_NUMBER }}
          path: /tmp
        continue-on-error: true

      - name: Apply patch and push branch
        id: push
        if: env.INV_OK == 'true' && env.HAS_PATCH == 'true'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          BRANCH="bot/fix-${ISSUE_NUMBER}"

          # Branch ownership guard: refuse to force-push if the remote branch
          # already exists with anything ahead of base. We cannot prove a
          # commit is bot-owned from inside git (the author/committer fields
          # are forgeable; a human can `git commit --author='emdashbot[bot]'`).
          # The only safe rule is "we own this branch only if it doesn't yet
          # exist on the remote". For revise, the apply job checked out the
          # existing bot/fix-<n> and applies a patch on top, so that flow does
          # NOT depend on a fresh branch.
          #
          # The maintainer can clear an orphan bot/fix-<n> manually with
          # `git push --force origin :bot/fix-<n>` if they want the bot to
          # take a fresh swing.
          REMOTE_TIP="$(git ls-remote --heads origin "$BRANCH" | awk '{print $1}')"
          if [ -n "$REMOTE_TIP" ] && [ "$MODE" != "revise" ]; then
            echo "::warning::$BRANCH already exists on origin; refusing to overwrite. Delete it manually to let the bot push a fresh fix."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "reason=branch-exists" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # CI-execution-surface guard: refuse any patch that touches workflow
          # or action files. The bot push lands on a same-repo bot/fix-<n>
          # branch, and Actions runs branch workflows with same-repo event
          # semantics; an agent prompt-injected into adding .github/workflows/
          # exfil.yml or modifying preview-releases.yml could exfiltrate
          # secrets or claim elevated GITHUB_TOKEN permissions. The agent
          # should never have a legitimate reason to touch these files; if a
          # bona-fide workflow change is needed it has to come from a human PR.
          PROTECTED_PATHS_RE='^\.github/(workflows|actions)/'
          # `--summary` prints `create mode`, `delete mode`, `rename from/to`
          # lines plus the diff headers; `--numstat` gives a clean filename
          # list of every touched path (before/after for renames).
          TOUCHED="$(git apply --numstat /tmp/fix.patch 2>/dev/null | awk '{ print $3; print $4 }' | sort -u)"
          if echo "$TOUCHED" | grep -qE "$PROTECTED_PATHS_RE"; then
            echo "::error::patch touches protected CI paths (.github/workflows/** or .github/actions/**); refusing"
            echo "$TOUCHED" | grep -E "$PROTECTED_PATHS_RE" | sed 's/^/  /'
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "reason=patch-touches-ci" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Apply the agent's patch. `git apply --check` validates BEFORE we
          # mutate anything; `--whitespace=nowarn` keeps the noisy whitespace
          # warnings out of the run log.
          if ! git apply --check --whitespace=nowarn /tmp/fix.patch; then
            echo "::warning::patch does not apply cleanly to current base"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "reason=patch-conflict" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git apply --whitespace=nowarn /tmp/fix.patch
          git config user.name "emdashbot[bot]"
          git config user.email "emdashbot[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add -A
          if ! git commit -F /tmp/commit-msg.txt; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "reason=no-diff-to-commit" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push with GIT_ASKPASS so the token stays in env, not on argv. The
          # agent (on the previous runner) is gone, so no scraper can read the
          # env of this git process.
          ASKPASS=/tmp/git-askpass.sh
          cat > "$ASKPASS" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            Username*) echo "x-access-token" ;;
            Password*) echo "${APP_TOKEN}" ;;
          esac
          EOF
          chmod 700 "$ASKPASS"
          export GIT_ASKPASS="$ASKPASS"
          if GIT_TERMINAL_PROMPT=0 git -c credential.helper= -c core.askpass="$ASKPASS" \
              push --force-with-lease origin "$BRANCH"; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "reason=push-failed" >> "$GITHUB_OUTPUT"
          fi
          rm -f "$ASKPASS"

      - name: Apply result to the machine
        if: always() && env.ISSUE_NUMBER != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('node:fs');
            const router = require('./.github/bot/router.cjs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const ok = process.env.INV_OK === 'true';
            const pushed = process.env.PUSHED === 'true';

            let result = null;
            try { result = JSON.parse(fs.readFileSync('/tmp/inv-result.json', 'utf8')); } catch { /* failed run */ }
            const event = router.outcomeFromResult({ ok, result, pushed });

            // Re-fetch live labels. If the orchestrator's dispatch-before-flip
            // sequence failed at the flip step, the issue may NOT carry
            // bot:working. The router accepts agent.* from `working` only, so
            // we synthesize the right base state if we find ourselves orphaned.
            const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
            const labels = issue.labels.map((l) => (typeof l === 'string' ? l : l.name));
            const state = router.currentState(labels);

            // A late agent result must NOT override a deliberate human action
            // taken while the run was in flight. If a maintainer reset the
            // issue (state: triage), moved it to a terminal (done/declined),
            // seized it (human_owned), or merged the bot PR mid-revise (done),
            // drop the agent result and leave the human's state alone. `triage`
            // is in the inert set: a maintainer running `@emdashbot reset`
            // during an in-flight run should not be undone by a synthesized
            // bot:working transition from the late agent result.
            const inert = new Set(['done', 'declined', 'human_owned', 'triage']);
            if (event.startsWith('agent.') && inert.has(state)) {
              core.info(`apply: agent result arrived but state is "${state}" (set by human action); ignoring`);
              await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber,
                body: `Agent run completed (\`${event}\`) but the issue is now \`${state}\` by human action; nothing to apply.` });
              return;
            }

            // Recovery: if state is not `working` but ALSO not human-terminal
            // (handled above), this is the dispatch-succeeded-but-flip-failed
            // race in orchestrate.yml. Synthesize bot:working for the routing
            // decision; use REAL labels for the remove list so we don't strand
            // the issue with two state labels. The terminal-state guard above
            // means we only synthesize over non-terminal, non-human states.
            let effectiveLabels = labels;
            const orphaned = state !== 'working' && event.startsWith('agent.');
            if (orphaned) {
              core.warning(`apply: expected bot:working, found ${state}; synthesising for outcome`);
              effectiveLabels = labels.filter((l) => !router.STATE_LABELS.includes(l));
              effectiveLabels.push('bot:working');
            }

            const decision = router.resolve({ labels: effectiveLabels, event, actor: 'system' });
            if (decision.kind !== 'transition') {
              core.info(`no transition for ${event} from ${state}; leaving as-is`);
              return;
            }

            await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: decision.addLabels });
            // decision.removeLabels already includes every state label except
            // the new one (router builds it from STATE_LABELS), so the
            // orphaned-state label is covered without special handling here.
            for (const l of decision.removeLabels) {
              if (!labels.includes(l)) continue;
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: l });
              } catch (e) {
                if (e.status === 404) continue;
                core.error(`removeLabel(${l}) failed: ${e.message}; issue ${issueNumber} may carry multiple state labels`);
                throw e;
              }
            }

            // The agent's `notes` can claim "Fix applied" even when the push
            // step refused (branch already exists, patch conflict, push 5xx).
            // If the trusted push step set pushed=false but the agent emitted
            // success notes, override the body with the push failure reason
            // so the comment doesn't lie about what happened.
            let notes = result && (result.notes || result.reason || result.attempts);
            const claimedFix = result && result.fixed === true;
            if (claimedFix && !pushed) {
              const reason = process.env.PUSH_REASON || 'unknown';
              notes = `Agent staged a fix but the trusted push step did not commit it (\`${reason}\`).`;
            }
            const ask = decision.to === 'awaiting_feedback'
              ? "\n\nA fix is on `bot/fix-" + issueNumber + "`. Reporter: does this resolve it? Reply `@emdashbot confirm` or `@emdashbot reject`."
              : "";
            await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber,
              body: (notes ? String(notes) : `Run complete (\`${event}\`).`) + ask + router.replyFooter(decision.to) });
        env:
          PUSHED: ${{ steps.push.outputs.pushed }}
          PUSH_REASON: ${{ steps.push.outputs.reason }}
